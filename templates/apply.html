{% extends 'base.html' %}
{% load static %}
{% block content %}
<div class="apply-container">
	<h2>Apply for Internship</h2>
	<form method="post" enctype="multipart/form-data" class="styled-form">
		{% csrf_token %}
		{% for field in form %}
			<div class="form-group">
				{{ field.label_tag }}
				{{ field }}
				{% if field.errors %}<div class="error">{{ field.errors|striptags }}</div>{% endif %}
			</div>
		{% endfor %}
		<button type="submit" class="btn-primary">Submit Application</button>
	</form>
</div>
<style>
.apply-container {
	max-width: 500px;
	margin: 2em auto;
	background: #fff;
	padding: 2em 2.5em;
	border-radius: 10px;
	box-shadow: 0 4px 24px rgba(0,0,0,0.08);
}
.apply-container h2 {
	text-align: center;
	margin-bottom: 1.5em;
}
.styled-form .input-field, .styled-form textarea, .styled-form select {
	width: 100%;
	padding: 0.8em;
	margin-bottom: 1em;
	border: 1px solid #ccc;
	border-radius: 5px;
	font-size: 1em;
}
.btn-primary {
	background: #007bff;
	color: #fff;
	border: none;
	padding: 0.8em 2em;
	border-radius: 5px;
	font-size: 1em;
	cursor: pointer;
	transition: background 0.2s;
}
.btn-primary:hover {
	background: #0056b3;
}
</style>
{% endblock %}
