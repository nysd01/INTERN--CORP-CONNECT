{% extends 'base.html' %}
{% load static %}
{% block content %}
<div class="dashboard-container">
	<h2>Welcome, {{ user.username }} <span class="role-badge">Company</span></h2>
	<div class="dashboard-cards">
		<a href="/company/post/" class="dashboard-card">
			<span class="icon">&#128221;</span>
			<div>Post New Internship</div>
		</a>
		<a href="/internships/" class="dashboard-card">
			<span class="icon">&#128188;</span>
			<div>View All Internships</div>
		</a>
		<a href="/applications/status/" class="dashboard-card">
			<span class="icon">&#128196;</span>
			<div>View Applications</div>
		</a>
		<a href="/messaging/" class="dashboard-card">
			<span class="icon">&#128172;</span>
			<div>Inbox</div>
		</a>
	</div>
</div>
<style>
.dashboard-container {
	max-width: 700px;
	margin: 2em auto;
	background: #fff;
	padding: 2em 2.5em;
	border-radius: 10px;
	box-shadow: 0 4px 24px rgba(0,0,0,0.08);
}
.dashboard-container h2 {
	text-align: center;
	margin-bottom: 2em;
}
.role-badge {
	background: #007bff;
	color: #fff;
	border-radius: 4px;
	padding: 0.2em 0.7em;
	font-size: 0.8em;
	margin-left: 0.5em;
}
.dashboard-cards {
	display: flex;
	flex-wrap: wrap;
	gap: 1.5em;
	justify-content: center;
}
.dashboard-card {
	background: #f5f5f5;
	border-radius: 8px;
	padding: 1.5em 2em;
	text-align: center;
	text-decoration: none;
	color: #222;
	box-shadow: 0 2px 8px rgba(0,0,0,0.04);
	transition: box-shadow 0.2s, background 0.2s;
	min-width: 160px;
	font-size: 1.1em;
}
.dashboard-card:hover {
	background: #e6f0ff;
	box-shadow: 0 4px 16px rgba(0,123,255,0.08);
}
.dashboard-card .icon {
	font-size: 2em;
	display: block;
	margin-bottom: 0.5em;
}
</style>
{% endblock %}
