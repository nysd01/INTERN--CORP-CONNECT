{% extends 'base.html' %}
{% load static %}
{% block content %}
<div class="login-container">
	<h2>Login</h2>
	<p class="login-info">Login with your username and password. Your dashboard will match your account type (Company or Intern).</p>
	<form method="post" class="styled-form">
		{% csrf_token %}
		{{ form.as_p }}
		<button type="submit" class="btn-primary">Login</button>
	</form>
	<div class="login-links">
		<span>Don't have an account?</span>
		<a href="/accounts/register/">Sign up as Intern or Company</a>
	</div>
</div>
<style>
.login-container {
	max-width: 400px;
	margin: 3em auto;
	background: #fff;
	padding: 2em 2.5em;
	border-radius: 10px;
	box-shadow: 0 4px 24px rgba(0,0,0,0.08);
}
.login-container h2 {
	text-align: center;
	margin-bottom: 1em;
}
.login-info {
	text-align: center;
	margin-bottom: 1.5em;
	color: #555;
}
.login-links {
	text-align: center;
	margin-top: 1.5em;
}
.login-links a {
	color: #007bff;
	text-decoration: none;
	margin-left: 0.5em;
}
.login-links a:hover {
	text-decoration: underline;
}
</style>
{% endblock %}
