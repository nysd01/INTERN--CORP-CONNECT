{% extends 'base.html' %}
{% load static %}
{% block content %}
<div class="logout-container">
	<h2>Logged Out</h2>
	<p>You have been successfully logged out.</p>
	<a href="/login/" class="btn-primary">Login Again</a>
</div>
<style>
.logout-container {
	max-width: 400px;
	margin: 4em auto;
	background: #fff;
	padding: 2em 2.5em;
	border-radius: 10px;
	box-shadow: 0 4px 24px rgba(0,0,0,0.08);
	text-align: center;
}
.btn-primary {
	background: #007bff;
	color: #fff;
	border: none;
	padding: 0.8em 2em;
	border-radius: 5px;
	font-size: 1em;
	cursor: pointer;
	transition: background 0.2s;
	text-decoration: none;
	display: inline-block;
	margin-top: 1em;
}
.btn-primary:hover {
	background: #0056b3;
}
</style>
{% endblock %}
