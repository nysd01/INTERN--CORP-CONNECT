{% extends 'base.html' %}
{% load static %}
{% block content %}
<div class="notifications-container">
	<h2>Notifications</h2>
	<ul class="notifications-list">
		{% for notification in notifications %}
		<li class="notification {% if not notification.read %}unread{% endif %}">
			<span>{{ notification.message }}</span>
			<span class="timestamp">{{ notification.timestamp|date:'M d, Y H:i' }}</span>
		</li>
		{% empty %}
		<li>No notifications.</li>
		{% endfor %}
	</ul>
</div>
<style>
.notifications-container {
	max-width: 600px;
	margin: 2em auto;
	background: #fff;
	padding: 2em 2.5em;
	border-radius: 10px;
	box-shadow: 0 4px 24px rgba(0,0,0,0.08);
}
.notifications-list {
	list-style: none;
	padding: 0;
}
.notification {
	padding: 1em;
	border-bottom: 1px solid #eee;
	display: flex;
	justify-content: space-between;
	align-items: center;
}
.notification.unread {
	background: #e6f0ff;
	font-weight: bold;
}
.timestamp {
	color: #888;
	font-size: 0.9em;
}
</style>
{% endblock %}
