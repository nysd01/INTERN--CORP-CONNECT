{% extends 'base.html' %}
{% load static %}
{% block content %}
<div class="auth-container">
    <h2>Create Your Account</h2>
    <form method="post" class="styled-form">
        {% csrf_token %}
        <div class="form-group">
            <label for="id_username">Username</label>
            {{ form.username }}
        </div>
        <div class="form-group">
            <label for="id_email">Email</label>
            {{ form.email }}
        </div>
        <div class="form-group">
            <label>User Type</label>
            {{ form.user_type }}
        </div>
        <div class="form-group">
            <label for="id_password1">Password</label>
            {{ form.password1 }}
        </div>
        <div class="form-group">
            <label for="id_password2">Confirm Password</label>
            {{ form.password2 }}
        </div>
        <button type="submit" class="btn-primary">Register</button>
    </form>
    <p class="switch-link">Already have an account? <a href="{% url 'login' %}">Login here</a></p>
</div>
<style>
.auth-container {
    max-width: 400px;
    margin: 3em auto;
    background: #fff;
    padding: 2em 2.5em;
    border-radius: 10px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
}
.auth-container h2 {
	text-align: center;
	margin-bottom: 1.5em;
}
.styled-form .form-group {
	margin-bottom: 1.2em;
}
.styled-form label {
	display: block;
	margin-bottom: 0.3em;
	font-weight: 500;
}
.styled-form input[type=text],
.styled-form input[type=email],
.styled-form input[type=password] {
	width: 100%;
	padding: 0.7em;
	border: 1px solid #ccc;
	border-radius: 5px;
	font-size: 1em;
}
.styled-form input[type=radio] {
	margin-right: 0.5em;
}
.btn-primary {
	width: 100%;
	background: #007bff;
	color: #fff;
	border: none;
	padding: 0.8em 0;
	border-radius: 5px;
	font-size: 1.1em;
	font-weight: 600;
	cursor: pointer;
	margin-top: 0.5em;
	transition: background 0.2s;
}
.btn-primary:hover {
	background: #0056b3;
}
.switch-link {
	text-align: center;
	margin-top: 1.5em;
}
</style>
{% endblock %}
